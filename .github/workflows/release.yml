name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Verify tag matches pyproject version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${TAG_NAME#v}"
          project_version="$(uv run python -c 'import tomllib; print(tomllib.loads(open("pyproject.toml","rb").read().decode())["project"]["version"])')"
          if [ "$tag_version" != "$project_version" ]; then
            echo "::error::Tag version ($tag_version) does not match pyproject.toml version ($project_version)."
            exit 1
          fi
          echo "Tag $TAG_NAME matches pyproject version $project_version."

      - name: Build sdist and wheel
        run: uv build

      - name: Check distributions
        run: pipx run twine check --strict dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish-pypi
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      # Trusted Publishing: no API token needed. The maintainer must configure
      # a Trusted Publisher at
      # https://pypi.org/manage/project/substrate-kb/settings/publishing/
      # before the first run (repo=xlreon/substrate, workflow=release.yml,
      # environment=pypi).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: github-release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
